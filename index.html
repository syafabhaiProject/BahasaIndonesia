<head>

            align-items: center;

            padding: 15px;
        }
        .container {

            border-radius: 20px;

            text-align: center;
            color: #333;
        }
        input, select {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
            box-sizing: border-box;
            font-size: 14px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #4facfe;
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            font-size: 15px;
            transition: 0.3s;
        }
        button:hover {
            background: #3a8be0;
        }
        button:disabled {
            background: #cccccc;
            cursor: not-allowed;
        }
        .error {
            color: #f44336;
            font-size: 13px;
            text-align: left;
            margin-bottom: 5px;
        }

        }

            justify-content: space-between;
            align-items: center;

            font-weight: bold;
            font-size: 18px;
            transition: background 0.3s;
        }
        .timer.warning {
            background: #ff9800;
        }
        .timer.danger {
            background: #f44336;
        }

        .cerita-box {
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            border-left: 4px solid;
            font-size: 13px;
            line-height: 1.6;
            max-height: 200px;
            overflow-y: auto;
        }

            background: #fff8e1;
            border-left-color: #ff9800;
        }
        .cerita-box.bazar strong {
            color: #e65100;
        }
        .cerita-box.perjalanan {
            background: #e3f2fd;
            border-left-color: #2196F3;
        }
        .cerita-box.perjalanan strong {
            color: #1565c0;
        }

            background: #e8f5e9;
            border-left-color: #4caf50;
        }

            color: #2e7d32;
        }

            background: #fce4ec;
            border-left-color: #e91e63;
        }

            color: #c2185b;
        }

            background: #f3e5f5;
            border-left-color: #9c27b0;
        }

            color: #6a1b9a;
        }

            border-radius: 4px;

            padding: 15px;

            font-size: 10px;
            margin-left: 5px;

            display: flex;
            align-items: center;
            gap: 12px;

            background: #e0e0e0;
        }

            background: #4facfe;
            color: white;
            border-color: #2196F3;
        }

            height: 20px;
            margin: 0;
            cursor: pointer;
            accent-color: #9c27b0;
            flex-shrink: 0;

            cursor: pointer;
        }

            background: #9c27b0;
            border-color: #7b1fa2;
        }

            flex: 1;

            border-radius: 8px;

            justify-content: center;

            margin: 15px 0;
            flex-wrap: wrap;
        }

            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
            transition: 0.3s;
            border: 2px solid #ddd;
        }
        .soal-badge:hover {
            background: #e0e0e0;
        }
        .soal-badge.active {
            background: #4facfe;
            color: white;
            border-color: #2196F3;
        }
        .soal-badge.answered {
            background: #4caf50;
            color: white;
            border-color: #2e7d32;
        }
        .soal-badge.kompleks-badge {
            border-color: #9c27b0;
        }

            color: #e65100;
            font-size: 13px;
            text-align: center;
            margin-top: 10px;
            padding: 10px;
            background: #fff3e0;

        }

            font-size: 12px;
            color: #999;
            text-align: center;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Login Section -->
    <div id="login">
        <h2>🔐 Login TKA</h2>
        <input type="text" id="user" placeholder="Username" autocomplete="off" value="P00398432">
        <input type="password" id="pass" placeholder="Password" value="4322*">
        <div class="error" id="loginErr"></div>
        <button onclick="login()">Masuk</button>
        <p style="font-size:12px; color:#999; text-align:center; margin-top:15px;">
            Gunakan: P00398432 / 4322*<br>atau P00408433 / 8999*
        </p>
    </div>

    <!-- Form Data Peserta -->

        <div class="error" id="errNama"></div>

        <input type="text" id="sekolah" placeholder="Asal Sekolah" autocomplete="off">
        <div class="error" id="errSekolah"></div>

        <label style="font-size:14px; color:#666;">Tanggal Lahir:</label>
        <div style="display: flex; gap: 5px;">
            <select id="tanggal" style="width: 33%;"></select>
            <select id="bulan" style="width: 33%;"></select>
            <select id="tahun" style="width: 34%;"></select>
        </div>
        <div class="error" id="errTanggal"></div>

        <button onclick="mulai()">Mulai Ujian</button>
    </div>

    <!-- Soal Ujian -->
    <div id="soal">
        <div class="header">
            <span class="soal-counter" id="soalCounter">📋 Soal 1 dari 5</span>
            <span class="timer" id="timer">75:00</span>
        </div>
        
        <div class="info-ujian" id="infoUjian">
            ⏱️ Waktu: 75 menit | 📝 Total: <span id="totalSoalDisplay">5</span> soal
        </div>
        
        <!-- Cerita Box -->
        <div class="cerita-box" id="ceritaBox"></div>
        
        <!-- Gambar Ilustrasi -->
        <div class="gambar-ilustrasi" id="gambarContainer"></div>
        
        <!-- Soal -->
        <div class="question" id="soalText"></div>
        
        <!-- Petunjuk untuk soal kompleks -->
        <div id="petunjukKompleks" style="display:none; font-size:13px; color:#9c27b0; margin-bottom:10px; padding:8px; background:#f3e5f5; border-radius:8px;">
            📌 <strong>Pilihan Kompleks:</strong> Bisa memilih lebih dari satu jawaban. Centang semua pernyataan yang BENAR!
        </div>
        
        <!-- Opsi Jawaban -->
        <div class="options" id="optionsContainer"></div>

        <!-- Indikator Soal -->
        <div class="soal-indicator" id="soalIndicator"></div>

        <!-- Navigasi -->
        <div class="navigation">
            <button class="nav-btn" id="btnPrev" onclick="prevSoal()" disabled>← Sebelumnya</button>
            <button class="nav-btn" id="btnNext" onclick="nextSoal()">Selanjutnya →</button>
        </div>

        <div class="warning" id="warningMsg"></div>
        <button id="btnSelesai" onclick="selesai()">✅ Selesai Ujian</button>
    </div>
</div>

    // ========== FUNGSI RENDER GAMBAR (VERSI BAHASA INDONESIA) ==========
function renderGambar(soal) {
    const namaGambar = soal.gambar;
    
    // Placeholder netral untuk semua soal
    const placeholderContent = `
        <div style="display:flex; align-items:center; justify-content:center; gap:10px; padding:10px;">
            <span style="font-size:45px;">📖📚</span>
        </div>
        <div style="font-size:14px; margin-top:5px;">
            <strong>📸 Ilustrasi Soal ${soal.nomor}</strong>
        </div>
        <div style="font-size:12px; color:#666; margin-top:5px;">
            ${soal.pertanyaan.substring(0, 50)}...
        </div>
    `;
    
    return `
        <div class="gambar-placeholder">
            <img src="${namaGambar}" alt="Gambar Soal ${soal.nomor}" 
                 style="max-width:100%; border-radius:8px;"
                 onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
            <div style="display:none;">
                ${placeholderContent}
            </div>
            <div class="gambar-caption">📸 Gambar: ${namaGambar}</div>
        </div>
    `;
}

    // ========== FUNGSI MULAI UJIAN ==========
    function mulai() {
        const nama = document.getElementById("nama");
        const sekolah = document.getElementById("sekolah");
        const tanggal = document.getElementById("tanggal");
        const bulan = document.getElementById("bulan");
        const tahun = document.getElementById("tahun");

        const errNama = document.getElementById("errNama");
        const errSekolah = document.getElementById("errSekolah");
        const errTanggal = document.getElementById("errTanggal");

        let valid = true;

        if(nama.value.trim() === "") {
            errNama.innerText = "⚠️ Nama lengkap wajib diisi";

        }

        if(sekolah.value.trim() === "") {
            errSekolah.innerText = "⚠️ Asal sekolah wajib diisi";
            valid = false;
        } else {
            errSekolah.innerText = "";
        }

        if(tanggal.value === "" || bulan.value === "" || tahun.value === "") {
            errTanggal.innerText = "⚠️ Tanggal lahir lengkap wajib diisi";
            valid = false;
        } else {
            errTanggal.innerText = "";
        }

        if(!valid) return;

        // Reset state
        currentSoal = 0;
        ujianSelesai = false;
        waktuHabis = false;
        jawabanUser = new Array(soalList.length).fill(null);

        document.getElementById("totalSoalDisplay").textContent = soalList.length;
        document.getElementById("form").style.display = "none";
        document.getElementById("soal").style.display = "block";

        initSoalIndicator();
        loadSoal(0);
        startTimer(WAKTU_UJIAN_MENIT * 60);
    }

    // ========== INISIALISASI INDIKATOR SOAL ==========
    function initSoalIndicator() {
        const indicator = document.getElementById("soalIndicator");
        indicator.innerHTML = "";

        for(let i = 0; i < soalList.length; i++) {
            const badge = document.createElement("div");
            badge.className = "soal-badge";
            if(soalList[i].tipe === "kompleks") {
                badge.classList.add("kompleks-badge");
            }
            if(i === currentSoal) badge.classList.add("active");
            badge.innerText = i + 1;
            badge.onclick = () => goToSoal(i);
            badge.title = `Soal ${i + 1}${soalList[i].tipe === "kompleks" ? " (Pilihan Kompleks)" : ""}`;
            indicator.appendChild(badge);
        }
    }

    // ========== UPDATE INDIKATOR SOAL ==========
    function updateSoalIndicator() {
        const badges = document.querySelectorAll(".soal-badge");
        badges.forEach((badge, index) => {
            badge.classList.remove("active", "answered");
            if(index === currentSoal) {
                badge.classList.add("active");
            }
            
            const jawaban = jawabanUser[index];
            if(jawaban !== null) {
                if(Array.isArray(jawaban) && jawaban.length > 0) {
                    badge.classList.add("answered");
                } else if(!Array.isArray(jawaban)) {
                    badge.classList.add("answered");
                }
            }
        });
    }

    // ========== LOAD SOAL ==========
    function loadSoal(index) {
        if (ujianSelesai) return;
        
        const soal = soalList[index];
        
        // ========== TAMPILKAN CERITA ==========
        const ceritaBox = document.getElementById("ceritaBox");
        const jenisCerita = soal.cerita;
        
        if (jenisCerita && CERITA[jenisCerita]) {
            const dataCerita = CERITA[jenisCerita];
            ceritaBox.style.display = "block";
            ceritaBox.className = `cerita-box ${dataCerita.class}`;
            ceritaBox.innerHTML = `
                <strong>${dataCerita.judul}</strong><br>
                ${dataCerita.konten}
            `;
        } else {
            ceritaBox.style.display = "none";
        }
        
        // Render gambar
        document.getElementById("gambarContainer").innerHTML = renderGambar(soal);
        
        // Tampilkan teks soal dengan badge
        let tipeBadge = '';
        let ceritaBadge = '';
        
        if (soal.tipe === "kompleks") {
            tipeBadge = '<span class="soal-type-badge kompleks">PILIHAN KOMPLEKS</span>';
        } else if (soal.tipe === "bangun-ruang") {
            tipeBadge = '<span class="soal-type-badge">BANGUN RUANG</span>';
        }
        
        if (soal.cerita) {
            const namaCerita = CERITA[soal.cerita]?.judul.replace(/[^a-zA-Z]/g, '').substring(0, 10) || soal.cerita;
            ceritaBadge = `<span class="cerita-badge">📖 ${soal.cerita}</span>`;
        }
        
        document.getElementById("soalText").innerHTML = `
            <span class="soal-nomor">🧪 SOAL ${soal.nomor}</span>${tipeBadge}${ceritaBadge}<br>
            <strong>${soal.pertanyaan}</strong>
        `;
        
        document.getElementById("soalCounter").innerText = `📋 Soal ${index + 1} dari ${soalList.length}`;
        
        // Tampilkan/sembunyikan petunjuk kompleks
        const petunjuk = document.getElementById("petunjukKompleks");
        petunjuk.style.display = soal.tipe === "kompleks" ? "block" : "none";

        // Generate options
        const optionsContainer = document.getElementById("optionsContainer");
        optionsContainer.innerHTML = "";
        
        const isKompleks = soal.tipe === "kompleks";
        const jawabanSaatIni = jawabanUser[index];

        soal.options.forEach(opt => {
            const div = document.createElement("div");
            div.className = "option";
            if (isKompleks) {
                div.classList.add("kompleks");
            }
            
            if (isKompleks) {
                const checkbox = document.createElement("input");
                checkbox.type = "checkbox";
                checkbox.value = opt;
                
                if (Array.isArray(jawabanSaatIni) && jawabanSaatIni.includes(opt)) {
                    checkbox.checked = true;
                    div.classList.add("selected");
                }
                
                const label = document.createElement("label");
                label.innerText = opt;
                label.style.flex = "1";
                label.style.cursor = "pointer";
                
                div.appendChild(checkbox);
                div.appendChild(label);
                
                div.onclick = (e) => {
                    if (e.target.type !== "checkbox") {
                        const cb = div.querySelector('input[type="checkbox"]');
                        cb.checked = !cb.checked;
                    }
                    pilihJawabanKompleks();
                };
            } else {
                div.setAttribute("data-value", opt);
                div.innerText = opt;
                div.onclick = (function(value) {
                    return function() { pilihJawabanBiasa(value); };
                })(opt);
                
                if(jawabanSaatIni === opt) {
                    div.classList.add("selected");
                }
            }
            
            optionsContainer.appendChild(div);
        });

        updateNavigation();
        updateSoalIndicator();
        cekSemuaTerjawab();
    }

    // ========== PILIH JAWABAN BIASA ==========
    function pilihJawabanBiasa(value) {
        if (ujianSelesai) return;
        
        jawabanUser[currentSoal] = value;

        const options = document.querySelectorAll('.option');
        options.forEach(opt => {
            if(opt.getAttribute('data-value') === value) {
                opt.classList.add('selected');
            } else {
                opt.classList.remove('selected');
            }
        });

        updateSoalIndicator();
        cekSemuaTerjawab();
    }

    // ========== PILIH JAWABAN KOMPLEKS ==========
    function pilihJawabanKompleks() {
        if (ujianSelesai) return;
        
        const options = document.querySelectorAll('.option.kompleks');
        const selectedValues = [];
        
        options.forEach(opt => {
            const checkbox = opt.querySelector('input[type="checkbox"]');
            if (checkbox && checkbox.checked) {
                selectedValues.push(checkbox.value);
                opt.classList.add("selected");
            } else {
                opt.classList.remove("selected");
            }
        });
        
        jawabanUser[currentSoal] = selectedValues;
        updateSoalIndicator();
        cekSemuaTerjawab();
    }

    // ========== UPDATE NAVIGASI ==========
    function updateNavigation() {
        const btnPrev = document.getElementById("btnPrev");
        const btnNext = document.getElementById("btnNext");

        btnPrev.disabled = (currentSoal === 0);

        if(currentSoal === soalList.length - 1) {
            btnNext.innerText = "✅ Selesai";
            btnNext.style.background = "#4caf50";
        } else {
            btnNext.innerText = "Selanjutnya →";
            btnNext.style.background = "#2196F3";
        }
    }

    // ========== NAVIGASI SOAL ==========
    function nextSoal() {
        if (ujianSelesai) return;
        
        if(currentSoal < soalList.length - 1) {
            currentSoal++;
            loadSoal(currentSoal);
        } else {
            selesai();
        }
    }

    function prevSoal() {
        if (ujianSelesai) return;
        
        if(currentSoal > 0) {
            currentSoal--;
            loadSoal(currentSoal);
        }
    }

    function goToSoal(index) {
        if (ujianSelesai) return;
        
        if(index >= 0 && index < soalList.length) {
            currentSoal = index;
            loadSoal(currentSoal);
        }
    }

    // ========== CEK SEMUA SOAL SUDAH DIJAWAB ==========
    function cekSemuaTerjawab() {
        const semuaTerjawab = jawabanUser.every(jawab => {
            if (jawab === null) return false;
            if (Array.isArray(jawab) && jawab.length === 0) return false;
            return true;
        });
        
        const btnSelesai = document.getElementById("btnSelesai");
        const warningMsg = document.getElementById("warningMsg");

        if(semuaTerjawab) {
            btnSelesai.style.background = "#4caf50";
            warningMsg.innerHTML = "✅ Semua soal sudah terjawab! Klik Selesai Ujian.";
            warningMsg.style.color = "#2e7d32";
            warningMsg.style.background = "#e8f5e9";
            warningMsg.classList.add("success");
        } else {
            btnSelesai.style.background = "#4facfe";
            const terjawab = jawabanUser.filter(j => {
                if (j === null) return false;
                if (Array.isArray(j) && j.length === 0) return false;
                return true;
            }).length;
            const belumTerjawab = soalList.length - terjawab;
            warningMsg.innerHTML = `📊 Progress: ${terjawab}/${soalList.length} soal terjawab (${belumTerjawab} belum)`;
            warningMsg.style.color = "#e65100";
            warningMsg.style.background = "#fff3e0";
            warningMsg.classList.remove("success");
        }
    }

    // ========== HITUNG SKOR ==========
    function hitungSkor() {
        let benar = 0;
        let salah = 0;
        let tidakDijawab = 0;
        
        for(let i = 0; i < soalList.length; i++) {
            const jawaban = jawabanUser[i];
            const kunci = soalList[i].correct;
            
            if(jawaban === null || (Array.isArray(jawaban) && jawaban.length === 0)) {
                tidakDijawab++;
            } else if(Array.isArray(kunci)) {
                const sortedJawaban = [...jawaban].sort();
                const sortedKunci = [...kunci].sort();
                if(JSON.stringify(sortedJawaban) === JSON.stringify(sortedKunci)) {
                    benar++;
                } else {
                    salah++;
                }
            } else {
                if(jawaban === kunci) {
                    benar++;
                } else {
                    salah++;
                }
            }
        }
        
        return { benar, salah, tidakDijawab };
    }

    // ========== TAMPILKAN MODAL HASIL ==========
    function tampilkanModalHasil(alasanSelesai = 'selesai') {
        const skor = hitungSkor();
        const totalSoal = soalList.length;
        const nilai = Math.round((skor.benar / totalSoal) * 100);
        const nama = document.getElementById("nama").value;
        const sekolah = document.getElementById("sekolah").value;

        const modal = document.createElement('div');
        modal.style.cssText = `
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        `;

        const modalContent = document.createElement('div');
        modalContent.style.cssText = `
            background: white;
            padding: 25px;
            border-radius: 20px;
            width: 420px;
            max-width: 90%;
            max-height: 85%;
            overflow-y: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        `;

        let alasanText = '';
        if (alasanSelesai === 'waktu_habis') {
            alasanText = '<p style="color:#f44336; font-weight:bold; text-align:center;">⏰ WAKTU HABIS! Ujian dikumpulkan otomatis.</p>';
        } else {
            alasanText = '<p style="color:#4caf50; font-weight:bold; text-align:center;">✅ Ujian selesai dikerjakan.</p>';
        }

        let hasilHTML = `
            <h2 style="color: #4facfe; margin-top:0; text-align:center;">🎉 Ujian Selesai!</h2>
            ${alasanText}
            <div style="background: #f5f5f5; padding: 15px; border-radius: 10px; margin-bottom: 15px;">
                <p style="margin:5px 0;"><strong>👤 Nama:</strong> ${nama}</p>
                <p style="margin:5px 0;"><strong>🏫 Sekolah:</strong> ${sekolah}</p>
                <hr>
                <p style="margin:5px 0; font-size:16px;"><strong>📊 Ringkasan:</strong></p>
                <p style="margin:5px 0;">✅ Benar: <strong>${skor.benar}</strong></p>
                <p style="margin:5px 0;">❌ Salah: <strong>${skor.salah}</strong></p>
                <p style="margin:5px 0;">⚠️ Tidak dijawab: <strong>${skor.tidakDijawab}</strong></p>
                <p style="margin:10px 0 5px; font-size:22px; color: ${nilai >= 70 ? '#4caf50' : '#ff9800'};">
                    <strong>Nilai Akhir: ${nilai}</strong>
                </p>
            </div>
            
            <div style="margin-bottom: 15px;">
                <h3 style="font-size:16px; margin-bottom:10px;">📝 Detail Jawaban:</h3>
        `;

        soalList.forEach((soal, idx) => {
            const jawaban = jawabanUser[idx];
            const kunci = soal.correct;
            let isCorrect = false;
            let jawabanText = '';
            
            if(jawaban === null || (Array.isArray(jawaban) && jawaban.length === 0)) {
                jawabanText = '<span style="color:#999;">(Tidak dijawab)</span>';
            } else if(Array.isArray(kunci)) {
                const sortedJawaban = [...jawaban].sort();
                const sortedKunci = [...kunci].sort();
                isCorrect = JSON.stringify(sortedJawaban) === JSON.stringify(sortedKunci);
                jawabanText = jawaban.join(', ');
            } else {
                isCorrect = jawaban === kunci;
                jawabanText = jawaban;
            }
            
            const bgColor = (jawaban === null || (Array.isArray(jawaban) && jawaban.length === 0)) ? '#fff3e0' : (isCorrect ? '#e8f5e9' : '#ffebee');
            const icon = (jawaban === null || (Array.isArray(jawaban) && jawaban.length === 0)) ? '⚠️' : (isCorrect ? '✅' : '❌');
            
            hasilHTML += `
                <div style="background: ${bgColor}; padding: 12px; border-radius: 8px; margin-bottom: 10px; font-size:13px;">
                    <strong>🧪 SOAL ${soal.nomor}:</strong> ${soal.pertanyaan.substring(0, 60)}...<br>
                    <span style="display:block; margin-top:8px;">
                        ${icon} Jawaban: ${jawabanText}
                        ${!isCorrect ? `<br><span style="color:#4caf50;">✓ Kunci: ${Array.isArray(kunci) ? kunci.join(', ') : kunci}</span>` : ''}
                    </span>
                    <div style="margin-top:8px; padding:8px; background:white; border-radius:6px; font-size:12px;">
                        ${soal.pembahasan}
                    </div>
                </div>
            `;
        });

        hasilHTML += `
            </div>
            <button onclick="tutupModal(this)" style="
                width: 100%;
                padding: 12px;
                background: #4facfe;
                color: white;
                border: none;
                border-radius: 10px;
                font-weight: bold;
                cursor: pointer;
                font-size: 16px;
            ">🏠 Kembali ke Login</button>
        `;

        modalContent.innerHTML = hasilHTML;
        modal.appendChild(modalContent);
        document.body.appendChild(modal);
    }

    function tutupModal(btn) {
        const modal = btn.parentElement.parentElement;
        modal.remove();
        resetKeLogin();
    }

    // ========== FUNGSI SELESAI ==========
    function selesai() {
        if (ujianSelesai) return;
        
        const terjawab = jawabanUser.filter(j => {
            if (j === null) return false;
            if (Array.isArray(j) && j.length === 0) return false;
            return true;
        }).length;
        
        const semuaTerjawab = terjawab === soalList.length;

        let konfirmasi = true;
        if(!semuaTerjawab) {
            konfirmasi = confirm(
                `⚠️ Perhatian!\n\n` +
                `Anda baru menjawab ${terjawab} dari ${soalList.length} soal.\n` +
                `${soalList.length - terjawab} soal belum dijawab.\n\n` +
                `Soal yang tidak dijawab akan dianggap SALAH.\n` +
                `Apakah Anda yakin ingin mengakhiri ujian?`
            );
        } else {
            konfirmasi = confirm("Apakah Anda yakin ingin mengakhiri ujian?\n\nJawaban akan dikumpulkan dan tidak dapat diubah.");
        }

        if(konfirmasi) {
            ujianSelesai = true;
            if(timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
            tampilkanModalHasil(waktuHabis ? 'waktu_habis' : 'selesai');
        }
    }

    // ========== RESET KE LOGIN ==========
    function resetKeLogin() {
        document.getElementById("soal").style.display = "none";
        document.getElementById("login").style.display = "block";
        document.getElementById("form").style.display = "none";

        document.getElementById("user").value = "";
        document.getElementById("pass").value = "";
        document.getElementById("nama").value = "";
        document.getElementById("sekolah").value = "";
        document.getElementById("tanggal").value = "";
        document.getElementById("bulan").value = "";
        document.getElementById("tahun").value = "";

        jawabanUser = [];
        currentSoal = 0;
        ujianSelesai = false;
        waktuHabis = false;
        
        const timerDisplay = document.getElementById("timer");
        timerDisplay.textContent = `${WAKTU_UJIAN_MENIT}:00`;
        timerDisplay.style.background = "#ff4d4d";
        timerDisplay.classList.remove("warning", "danger");
    }

    // ========== TIMER ==========
    function startTimer(durasi) {
        let time = durasi;
        const display = document.getElementById("timer");
        
        if(timerInterval) clearInterval(timerInterval);
        
        timerInterval = setInterval(() => {
            if (ujianSelesai) {
                clearInterval(timerInterval);
                return;
            }
            
            let m = Math.floor(time / 60);
            let s = time % 60;
            
            display.textContent = `${m}:${s < 10 ? '0' + s : s}`;
            
            if(time === 300) {
                display.classList.add("warning");
                alert("⏰ PERHATIAN! Waktu tinggal 5 menit lagi!");
            }
            
            if(time === 60) {
                display.classList.remove("warning");
                display.classList.add("danger");
            }

            if(time <= 0) {
                clearInterval(timerInterval);
                timerInterval = null;
                waktuHabis = true;
                ujianSelesai = true;
                
                alert("⏰ WAKTU HABIS!\n\nUjian akan dikumpulkan secara otomatis.\nSoal yang tidak dijawab akan dianggap SALAH.");
                tampilkanModalHasil('waktu_habis');
            }
            time--;
        }, 1000);
    }
</script>
</body>
</html>
