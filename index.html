<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cara Bj. Habiebie mengubah pemahaman kita tentang pesawat</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: red;
  color: white;

}

/* Materi */
#materi {
  padding: 15px;
  background: #2c3e50;
}

/* Tools */
#tools {
  display: flex;
  gap: 5px;
  padding: 10px;
  background: #222;
}

button, input {
  padding: 6px 10px;
  border-radius: 6px;
  border: none;
}

/* Canvas */
#container {
  position: relative;
}

canvas {
  width: 100%;
  height: 60vh;
  background: white;
  touch-action: none;
}
</style>
</head>

<body>

<div id="materi">
  <h2>Kalkulus - Turunan</h2>
  <p>Turunan menunjukkan perubahan suatu fungsi.</p>
  <p><b>Contoh:</b> f(x) = x² → f'(x) = 2x</p>
</div>

<div id="tools">
  <button onclick="setMode('draw')">✍️ Tulis</button>
  <button onclick="setMode('erase')">🧽 Hapus</button>
  <input type="color" id="colorPicker" value="#000000">
  <button onclick="clearCanvas()">Clear</button>
  <button onclick="drawGrid()">Grid</button>
  <button onclick="drawGraph()">Grafik</button>
</div>

<div id="container">
  <canvas id="board"></canvas>
</div>

<script>
const canvas = document.getElementById('board');
const ctx = canvas.getContext('2d');

let drawing = false;
let mode = 'draw';
let color = document.getElementById('colorPicker').value;

// resize
function resizeCanvas() {
  canvas.width = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// mode
function setMode(m) {
  mode = m;
}

// warna
document.getElementById('colorPicker').addEventListener('input', (e) => {
  color = e.target.value;
});

// touch start
canvas.addEventListener('touchstart', () => {
  drawing = true;
});

// touch end
canvas.addEventListener('touchend', () => {
  drawing = false;
  ctx.beginPath();
});

// touch move
canvas.addEventListener('touchmove', (e) => {
  if (!drawing) return;

  const touch = e.touches[0];
  const rect = canvas.getBoundingClientRect();

  const x = touch.clientX - rect.left;
  const y = touch.clientY - rect.top;

  if (mode === 'draw') {
    ctx.globalCompositeOperation = 'source-over';
    ctx.strokeStyle = color;
    ctx.lineWidth = 3;
  } else if (mode === 'erase') {
    ctx.globalCompositeOperation = 'destination-out';
    ctx.lineWidth = 20;
  }

  ctx.lineCap = 'round';
  ctx.lineTo(x, y);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x, y);
});

// clear semua
function clearCanvas() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}

// grid koordinat
function drawGrid() {
  clearCanvas();
  ctx.strokeStyle = '#ddd';
  ctx.lineWidth = 1;

  for (let x = 0; x < canvas.width; x += 25) {
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, canvas.height);
    ctx.stroke();
  }

  for (let y = 0; y < canvas.height; y += 25) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(canvas.width, y);
    ctx.stroke();
  }
}

// grafik y = x^2
function drawGraph() {
  drawGrid();

  ctx.strokeStyle = 'red';
  ctx.lineWidth = 2;

  ctx.beginPath();

  for (let x = -150; x < 150; x++) {
    let y = (x * x) / 50;

    let drawX = canvas.width / 2 + x;
    let drawY = canvas.height / 2 - y;

    ctx.lineTo(drawX, drawY);
  }

  ctx.stroke();
}
</script>

</body>
</html>
